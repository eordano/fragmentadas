<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Cuento corto por Esteban Ordano">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌎</text></svg>">
    <title>Memorias Fragmentadas</title>
    <style type="text/css">
      body{
        margin:40px auto;
        max-width:650px;
        line-height:1.6;
        font-size:18px;
        color:#2e2e2e;
        padding:0 10px
      }
      h1,h2,h3{
        line-height: 1.2;
        font-family: Georgia,serif;
      }
      p {
        font-family: Roboto,sans-serif;
        font-size: 16px;
      }
      h1 { color: #212121; }
      h2 { color: #424242; }
      h3 { color: #636363; }
      a { color: #636363; }
      a:visited { color: #636363; }
      a:hover { color: #0b6dd4; }
    </style>
  </head>
  <body>
    <div id="root"><div><h1>Memorias Fragmentadas</h1><div class="apertura"><p>En una memoria fragmentada, aquello que se supone real pierde sentido<br>y engendra entendimiento</p><p>Cualquier día es un final<br>Cualquier día es un inicio</p><p>Círculos dentro de círculos</p><p>El tiempo uno solo<br>Y el caos vida</p></div><a id="random">Al azar</a> <a class="navbar" href="ep/0.html">En orden</a></div></div><div id="elements"/>
  </body>
  <script>
    (function(window) {
      window.addEventListener('load', function() {
        window.document.getElementById('random').setAttribute('href', '/ep/' + random())
        if (window.localStorage.getItem('first-time')) {
          var content = '<h3>Viaje temporal</h3><ul>' + LIST.map(listElement).join('\n') + '</ul>'
          window.document.getElementById('elements').innerHTML = content
        }
        else {
          window.localStorage.setItem('first-time', 'no')
        }
        function listElement(_) {
          return '<li><a href="https://fragmentadas.com/ep/'&#32;+&#32;_&#32;+&#32;'">Día ' + _ + '</a></li>'
        }
      })
      function random() {
        return LIST[Math.floor(Math.random() * LIST.length)]
      }
    })(window);
    var LIST = [
0, 3, 7, 8, 12, 15, 20, 22, 26, 34, 35, 39, 45, 50, 52, 61, 67, 80, 93, 103, 120, 140, 157, 160, 172, 177, 187, 189, 190, 192, 194, 200, 280, 300, 302,
];</script></body></html>
