{% extends 'base.html' %}

{% block root %}
<div>
  <h3><a href="/">Memorias Fragmentadas</a></h3>
  <h4>
    {% if prev is not none %} <a href="/ep/{{ prev }}">&lt; previo</a> {% endif %}
    <a id="random"> al azar</a>
    {% if next is not none %} <a href="/ep/{{ next }}">siguiente &gt;</a> {% endif %}
  </h4>

  <div>
    <h1>Día {{ day }}</h1>
    <div class="content">{{ content }}</div>
  </div>
</div>
{% endblock %}
